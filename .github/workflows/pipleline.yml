name: 🛒 Mercado Libre Pipeline

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  sync-to-postgres:
    name: SQLite → PostgreSQL
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 🐘 Fase 2 · SQLite → PostgreSQL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python ecommerce-pipeline-fase2/scripts/extract_load_pg.py