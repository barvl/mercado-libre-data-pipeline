version: "3.8"

services:

  scraper:
    build: .
    container_name: ml_scraper
    command: python ecommerce-pipeline-fase1/scripts/extract_load.py
    volumes:
      - ./ecommerce-pipeline-fase1/sql:/app/ecommerce-pipeline-fase1/sql
    environment:
      - PYTHONUNBUFFERED=1
      - DOCKER_ENV=true
    restart: no  # script batch — no reiniciar en loop
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/ecommerce-pipeline-fase1/sql/ecommerce.db"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 5s

  sync:
    build: .
    container_name: ml_sync
    command: python ecommerce-pipeline-fase2/scripts/extract_load_pg.py
    volumes:
      - ./ecommerce-pipeline-fase1/sql:/app/ecommerce-pipeline-fase1/sql
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      scraper:
        condition: service_healthy  # espera a que .db exista
    restart: no

  dashboard:
    build: .
    container_name: ml_dashboard
    command: streamlit run fase_III/scripts/dashboard.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped  # este sí es un proceso largo — correcto